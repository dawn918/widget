<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chalk Quote Widget</title>

  <script type="text/javascript" nonce="XOJ0BVE+zr3qdJZKBBAaLFbFzesxhK/xP1QmLnOdycs=" src="//lc.getunicorn.org?type=base-script&amp;request-id=18801"></script><link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8f3ea;
      overflow: hidden;
      font-family: 'Gaegu', cursive;
    }

    .board {
      position: relative;
      width: 92vw;
      max-width: 1200px;
      height: 620px;
      background: #87a786;
      border: 14px solid #dcc3a1;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .board::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0.5;
    }

    .chalk-tray {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 22px;
      background: #cfae84;
    }

    .eraser {
      position: absolute;
      bottom: 10px;
      left: 26px;
      width: 100px;
      height: 42px;
      border-radius: 10px;
      background: #efe2c8;
      border: 1px solid #c9b08c;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .eraser::after {
      content: "";
      position: absolute;
      top: 0;
      left: 38px;
      width: 24px;
      height: 100%;
      background: #57545f;
      border-radius: 4px;
    }

    .chalks {
      position: absolute;
      bottom: 10px;
      right: 30px;
      display: flex;
      gap: 12px;
    }

    .chalk {
      width: 58px;
      height: 16px;
      border-radius: 999px;
    }

    .chalk.white { background: #f5f1ea; }
    .chalk.pink { background: #f3c3cf; }
    .chalk.yellow { background: #f5df9f; }
    .chalk.green { background: #b8d9b4; }

    .refresh {
      position: absolute;
      top: 28px;
      right: 32px;
      width: 72px;
      height: 72px;
      border: none;
      background: transparent;
      color: #fffdf8;
      font-size: 42px;
      cursor: pointer;
      transition: transform 0.35s ease;
      z-index: 10;
    }

    .refresh:hover {
      transform: rotate(180deg);
    }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      text-align: center;
    }

    .quote {
      max-width: 900px;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fffdf6;
      font-size: 64px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      word-break: keep-all;
    }

    .author {
      margin-top: 10px;
      color: #f7dfab;
      font-size: 42px;
      letter-spacing: 0.08em;
    }

    .underline {
      width: 320px;
      height: 6px;
      border-radius: 999px;
      background: #f0bcc7;
      margin-top: 18px;
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .board {
        height: 500px;
      }

      .quote {
        font-size: 40px;
        min-height: 180px;
      }

      .author {
        font-size: 28px;
      }

      .underline {
        width: 220px;
      }
    }
  </style>
</head>

<body>

  <div class="board">

    <button class="refresh" onclick="showRandomQuote()">
      ↻
    </button>

    <div class="content">
      <div class="quote" id="quote"></div>

      <div class="author" id="author"></div>

      <div class="underline"></div>
    </div>

    <div class="eraser"></div>

    <div class="chalks">
      <div class="chalk white"></div>
      <div class="chalk pink"></div>
      <div class="chalk yellow"></div>
      <div class="chalk green"></div>
    </div>

    <div class="chalk-tray"></div>

  </div>

  <script>
    const quotes = [
      {
        quote: "완벽하려고 하지 말고,\n계속하려고 해라.",
        author: "James Clear"
      },
      {
        quote: "작은 행동 하나가\n삶의 방향을 바꾼다.",
        author: "Atomic Habits"
      },
      {
        quote: "동기보다 중요한 건\n환경이다.",
        author: "행동 설계 원칙"
      },
      {
        quote: "천천히 가도 멈추지 않으면\n결국 도착한다.",
        author: "공자"
      },
      {
        quote: "오늘의 기분이 아니라,\n오늘의 목표대로 움직여라.",
        author: "Unknown"
      },
      {
        quote: "지속성은 재능을 이긴다.",
        author: "Unknown"
      }
    ];

    function showRandomQuote() {
      const random = Math.floor(Math.random() * quotes.length);

      document.getElementById("quote").innerText =
        quotes[random].quote;

      document.getElementById("author").innerText =
        "— " + quotes[random].author + " —";
    }

    showRandomQuote();
  </script>

</body>
</html>
