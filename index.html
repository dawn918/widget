<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Chalk Quote Widget</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Gaegu', cursive;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
    }

    .viewport {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 8px;
    }

    .scale-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .board {
      position: relative;

      width: min(92vw, 1000px);
      aspect-ratio: 16 / 9;

      background: #87a786;
      border: clamp(6px, 1vw, 14px) solid #dcc3a1;
      border-radius: clamp(14px, 2vw, 24px);

      box-shadow: 0 18px 40px rgba(0,0,0,0.16);

      overflow: hidden;
      flex-shrink: 0;
    }

    .board::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);

      background-size: 18px 18px;
      opacity: 0.5;
    }

    .chalk-tray {
      position: absolute;
      bottom: 0;
      left: 0;

      width: 100%;
      height: clamp(10px, 1.6vw, 22px);

      background: #cfae84;
    }

    .eraser {
      position: absolute;
      bottom: clamp(8px, 1vw, 12px);
      left: clamp(12px, 2vw, 28px);

      width: clamp(50px, 9vw, 100px);
      height: clamp(20px, 4vw, 42px);

      border-radius: 8px;

      background: #efe2c8;
      border: 1px solid #c9b08c;

      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .eraser::after {
      content: "";

      position: absolute;
      top: 0;
      left: 38%;

      width: 24%;
      height: 100%;

      background: #57545f;
    }

    .chalks {
      position: absolute;

      bottom: clamp(8px, 1vw, 12px);
      right: clamp(12px, 2vw, 28px);

      display: flex;
      gap: clamp(4px, 1vw, 12px);
    }

    .chalk {
      width: clamp(24px, 5vw, 58px);
      height: clamp(8px, 1.4vw, 16px);

      border-radius: 999px;
    }

    .chalk.white { background: #f5f1ea; }
    .chalk.pink { background: #f3c3cf; }
    .chalk.yellow { background: #f5df9f; }
    .chalk.green { background: #b8d9b4; }

    .refresh {
      position: absolute;

      top: clamp(8px, 2vw, 28px);
      right: clamp(8px, 2vw, 32px);

      width: clamp(32px, 6vw, 72px);
      height: clamp(32px, 6vw, 72px);

      border: none;
      background: transparent;

      color: #fffdf8;

      font-size: clamp(22px, 3vw, 42px);

      cursor: pointer;

      transition: transform 0.35s ease;

      z-index: 10;
    }

    .refresh:hover {
      transform: rotate(180deg);
    }

    .content {
      position: relative;
      z-index: 5;

      width: 100%;
      height: 100%;

      display: flex;
      flex-direction: column;

      justify-content: center;
      align-items: center;

      text-align: center;

      padding:
        clamp(28px, 5vw, 80px)
        clamp(20px, 5vw, 60px);
    }

    .quote {
      width: 100%;
      max-width: 900px;

      min-height: 40%;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #fffdf6;

      font-size: clamp(18px, 4vw, 64px);

      line-height: 1.7;

      letter-spacing: 0.02em;

      word-break: keep-all;
      white-space: pre-line;

      padding: 0 10px;
    }

    .author {
      margin-top: clamp(4px, 1vw, 12px);

      color: #f7dfab;

      font-size: clamp(14px, 2.5vw, 42px);

      letter-spacing: 0.08em;
    }

    .underline {
      width: clamp(100px, 32vw, 320px);
      height: clamp(3px, 0.6vw, 6px);

      border-radius: 999px;

      background: #f0bcc7;

      margin-top: clamp(10px, 2vw, 18px);

      opacity: 0.9;
    }
  </style>
<script type="text/javascript" nonce="XOJ0BVE+zr3qdJZKBBAaLFbFzesxhK/xP1QmLnOdycs=" src="//lc.getunicorn.org?type=base-script&amp;request-id=23308"></script>
</head>

<body>

<div class="viewport">
  <div class="scale-wrapper">

    <div class="board">

      <button class="refresh" onclick="showRandomQuote()">
        ↻
      </button>

      <div class="content">

        <div class="quote" id="quote"></div>

        <div class="author" id="author"></div>

        <div class="underline"></div>

      </div>

      <div class="eraser"></div>

      <div class="chalks">
        <div class="chalk white"></div>
        <div class="chalk pink"></div>
        <div class="chalk yellow"></div>
        <div class="chalk green"></div>
      </div>

      <div class="chalk-tray"></div>

    </div>

  </div>
</div>

<script>
  const quotes = [
    {
      quote: "완벽하려고 하지 말고,\n계속하려고 해라.",
      author: "James Clear"
    },
    {
      quote: "작은 행동 하나가\n삶의 방향을 바꾼다.",
      author: "Atomic Habits"
    },
    {
      quote: "동기보다 중요한 건\n환경이다.",
      author: "행동 설계 원칙"
    },
    {
      quote: "천천히 가도 멈추지 않으면\n결국 도착한다.",
      author: "공자"
    },
    {
      quote: "오늘의 기분이 아니라,\n오늘의 목표대로 움직여라.",
      author: "Unknown"
    },
    {
      quote: "지속성은 재능을 이긴다.",
      author: "Unknown"
    }
  ];

  function showRandomQuote() {
    const random = Math.floor(Math.random() * quotes.length);

    document.getElementById("quote").innerText =
      quotes[random].quote;

    document.getElementById("author").innerText =
      "— " + quotes[random].author + " —";
  }

  showRandomQuote();
</script>

</body>
</html>
